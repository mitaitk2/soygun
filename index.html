<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARANTİNA | Resmi Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid #333; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-xl w-full space-y-6">
        
        <div class="glass p-8 rounded-3xl border-l-4 border-red-600">
            <h1 class="text-5xl font-black tracking-tighter">KARANTİNA</h1>
            <p class="text-zinc-400 mt-2">Adaletin adresi, kara mizahın merkezi.</p>
        </div>

        <div class="glass p-6 rounded-2xl border border-red-900/30">
            <div class="flex items-center gap-2 mb-3">
                <span class="bg-red-600 w-2 h-2 rounded-full animate-pulse"></span>
                <h2 class="text-xs font-bold text-red-500 uppercase tracking-widest">Son Duyuru</h2>
            </div>
            <p class="text-white text-lg font-medium leading-relaxed">
                "Sunucumuzda yeni etkinlikler başlıyor! Katılmak için discord kanalımızı takipte kalın."
            </p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-2xl">
                <p class="text-zinc-500 text-xs font-bold uppercase">Durum</p>
                <h3 class="text-2xl font-black text-green-500">ÇEVRİMİÇİ</h3>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-zinc-500 text-xs font-bold uppercase">Sistem</p>
                <h3 class="text-2xl font-black text-white">V 2.0</h3>
            </div>
        </div>

        <a href="https://discord.gg/karantina" class="block w-full bg-red-600 hover:bg-red-700 text-center py-5 rounded-2xl font-bold transition-all transform hover:scale-[1.02]">
            SUNUCUYA KATIL
        </a>
    </div>
</body>
</html>
